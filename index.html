<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0e27">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>PokeForge</title>
<style>
  :root {
    --bg-deep: #0a0e27;
    --bg-card: #151b3d;
    --bg-card-light: #1f2754;
    --gold: #ffd93d;
    --gold-dim: #c9a82f;
    --red: #ff4757;
    --green: #2ed573;
    --cyan: #26e0e0;
    --text: #f1f2f6;
    --text-dim: #a4b0be;
    --border: #2c3378;
    --shadow: 0 3px 0 #05081a, 0 6px 16px rgba(0,0,0,0.5);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { touch-action: manipulation; -webkit-text-size-adjust: 100%; }
  html, body {
    background: var(--bg-deep);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    height: 100%;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    overscroll-behavior: none;
  }
  body {
    background: radial-gradient(ellipse at top, rgba(85,82,237,0.15), transparent 60%), radial-gradient(ellipse at bottom, rgba(165,94,234,0.1), transparent 60%), var(--bg-deep);
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
    position: fixed;
    width: 100%;
  }
  .app {
    max-width: 500px;
    margin: 0 auto;
    padding: 8px 12px;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .header { text-align: center; padding: 8px 0; }
  .header h1 {
    font-size: clamp(16px, 5vw, 22px);
    color: var(--gold);
    text-shadow: 2px 2px 0 var(--red), 4px 4px 0 rgba(0,0,0,0.5);
    letter-spacing: 2px;
    font-weight: 900;
  }
  .statbar { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
  .stat {
    background: var(--bg-card);
    border: 2px solid var(--border);
    padding: 6px 10px;
    border-radius: 8px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-icon { font-size: 18px; }
  .stat-info { flex: 1; min-width: 0; }
  .stat-label { font-size: 10px; color: var(--text-dim); }
  .stat-value {
    font-size: 15px;
    color: var(--gold);
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pokemon-stage {
    background: linear-gradient(180deg, var(--bg-card-light) 0%, var(--bg-card) 100%);
    border: 3px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    text-align: center;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .level-badge {
    display: inline-block;
    background: var(--gold);
    color: var(--bg-deep);
    padding: 4px 12px;
    border-radius: 16px;
    font-size: 11px;
    margin-bottom: 8px;
    font-weight: 900;
    box-shadow: 0 2px 0 var(--gold-dim);
  }
  .level-badge.max {
    background: linear-gradient(90deg, #ff4757, #ffd93d, #26e0e0, #a55eea);
    background-size: 200% 100%;
    animation: rainbow 2s linear infinite;
    color: #fff;
  }
  @keyframes rainbow { 0% { background-position: 0% 0; } 100% { background-position: 200% 0; } }
  .pokemon-image-wrapper {
    position: relative;
    height: min(36vw, 160px);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 4px;
  }
  .pokemon-image {
    width: 100%;
    height: 100%;
    max-width: 160px;
    max-height: 160px;
    object-fit: contain;
    image-rendering: pixelated;
    filter: drop-shadow(0 8px 16px rgba(0,0,0,0.5));
  }
  .pokemon-image.bouncing { animation: bounce 0.6s ease; }
  .pokemon-image.shaking { animation: shake 0.5s ease; }
  .pokemon-image.evolving { animation: evolve 1s ease; }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    30% { transform: translateY(-18px) scale(1.1); }
    60% { transform: translateY(0) scale(0.95); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px) rotate(-3deg); }
    40% { transform: translateX(8px) rotate(3deg); }
    60% { transform: translateX(-6px) rotate(-2deg); }
    80% { transform: translateX(6px) rotate(2deg); }
  }
  @keyframes evolve {
    0% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.25); filter: brightness(5) drop-shadow(0 0 50px #ffd93d); }
    100% { transform: scale(1); filter: brightness(1); }
  }
  .pokemon-name {
    font-size: clamp(17px, 5vw, 22px);
    color: var(--text);
    margin-bottom: 2px;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
    line-height: 1.2;
    font-weight: bold;
  }
  .pokemon-number {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: bold;
  }
  .probability-preview {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 5px;
    margin-bottom: 8px;
    padding: 6px;
    background: var(--bg-card);
    border: 2px solid var(--border);
    border-radius: 10px;
  }
  .prob { text-align: center; padding: 4px 2px; border-radius: 6px; background: rgba(255,255,255,0.03); }
  .prob-label { font-size: 10px; margin-bottom: 2px; font-weight: bold; }
  .prob-label.success { color: var(--green); }
  .prob-label.keep { color: var(--gold); }
  .prob-label.destroy { color: var(--red); }
  .prob-value { font-size: 13px; color: var(--text); font-weight: 900; }
  .result-log {
    background: rgba(0,0,0,0.3);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    margin-bottom: 8px;
    height: 62px;
    overflow-y: auto;
    font-size: 12px;
    line-height: 1.5;
    -webkit-overflow-scrolling: touch;
  }
  .result-log div { margin-bottom: 2px; animation: slideIn 0.3s ease; }
  .result-log .success { color: var(--green); }
  .result-log .keep { color: var(--gold); }
  .result-log .destroy { color: var(--red); font-weight: bold; }
  .result-log .evolve { color: var(--cyan); font-weight: bold; }
  .result-log .system { color: var(--text-dim); }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .actions { display: grid; grid-template-columns: 2fr 1fr; gap: 8px; margin-bottom: 6px; }
  button.btn {
    font-size: 15px;
    padding: 14px 10px;
    border: 3px solid;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 4px 0;
    min-height: 48px;
    -webkit-appearance: none;
    font-family: inherit;
    font-weight: bold;
  }
  button.btn:active:not(:disabled) { transform: translateY(3px); box-shadow: 0 1px 0 !important; }
  button.btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-enhance {
    background: linear-gradient(180deg, #ff6b7a 0%, var(--red) 100%);
    color: #fff;
    border-color: #c73545;
    box-shadow: 0 4px 0 #8b1f2a;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
  }
  .btn-sell {
    background: linear-gradient(180deg, #5eead4 0%, var(--cyan) 100%);
    color: var(--bg-deep);
    border-color: #0891b2;
    box-shadow: 0 4px 0 #0e7490;
    font-size: 13px;
  }
  .bottom-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .btn-mini {
    background: var(--bg-card);
    color: var(--text);
    border-color: var(--border);
    box-shadow: 0 3px 0 #000814;
    font-size: 12px;
    padding: 10px 4px;
    min-height: 42px;
  }
  .flash-overlay { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 999; transition: opacity 0.2s; }
  .flash-overlay.active { opacity: 0.9; }
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-backdrop.active { display: flex; }
  .modal {
    background: var(--bg-card);
    border: 3px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    max-width: 360px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal h2 { font-size: 14px; color: var(--gold); margin-bottom: 12px; text-align: center; font-weight: 900; }
  .modal-text { font-size: 12px; line-height: 1.6; color: var(--text-dim); margin-bottom: 12px; }
  .prob-table { width: 100%; font-size: 11px; border-collapse: collapse; margin-bottom: 12px; }
  .prob-table th, .prob-table td { padding: 4px 2px; text-align: center; border-bottom: 1px solid var(--border); }
  .prob-table th { color: var(--gold); font-size: 10px; }
  .prob-table td.current { background: rgba(255,217,61,0.15); color: var(--gold); font-weight: bold; }
  button.modal-close {
    width: 100%;
    background: var(--red);
    color: #fff;
    border: 3px solid #8b1f2a;
    padding: 12px;
    border-radius: 8px;
    font-size: 15px;
    box-shadow: 0 3px 0 #8b1f2a;
    font-family: inherit;
    font-weight: bold;
  }
  .pop-text {
    position: absolute;
    font-size: 14px;
    font-weight: 900;
    pointer-events: none;
    animation: popUp 1.2s ease forwards;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.7);
    z-index: 10;
    left: 50%;
    top: 30%;
  }
  @keyframes popUp {
    0% { opacity: 0; transform: translate(-50%, 0) scale(0.5); }
    30% { opacity: 1; transform: translate(-50%, -35px) scale(1.2); }
    100% { opacity: 0; transform: translate(-50%, -90px) scale(1); }
  }
  @media (max-height: 700px) {
    .pokemon-image-wrapper { height: min(30vw, 130px); }
    .pokemon-image { max-width: 130px; max-height: 130px; }
    .result-log { height: 50px; }
  }
  @media (max-height: 600px) {
    .result-log { display: none; }
    .pokemon-image-wrapper { height: 100px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header"><h1>POKE FORGE</h1></div>
  <div class="statbar">
    <div class="stat">
      <span class="stat-icon">G</span>
      <div class="stat-info">
        <div class="stat-label">GOLD</div>
        <div class="stat-value" id="gold">100,000</div>
      </div>
    </div>
    <div class="stat">
      <span class="stat-icon">T</span>
      <div class="stat-info">
        <div class="stat-label">TRY</div>
        <div class="stat-value" id="attempts">0</div>
      </div>
    </div>
  </div>
  <div class="pokemon-stage" id="stage">
    <div class="level-badge" id="level-badge">+0 강</div>
    <div class="pokemon-image-wrapper">
      <img class="pokemon-image" id="pokemon-img" alt="pokemon">
    </div>
    <div class="pokemon-name" id="pokemon-name">로딩중</div>
    <div class="pokemon-number" id="pokemon-number">NO.000</div>
  </div>
  <div class="probability-preview">
    <div class="prob"><div class="prob-label success">성공</div><div class="prob-value" id="p-success">100%</div></div>
    <div class="prob"><div class="prob-label keep">유지</div><div class="prob-value" id="p-keep">0%</div></div>
    <div class="prob"><div class="prob-label destroy">방생</div><div class="prob-value" id="p-destroy">0%</div></div>
  </div>
  <div class="result-log" id="log">
    <div class="system">오박사: 어서오게, 트레이너!</div>
  </div>
  <div class="actions">
    <button class="btn btn-enhance" id="btn-enhance">강화 (10G)</button>
    <button class="btn btn-sell" id="btn-sell">판매</button>
  </div>
  <div class="bottom-actions">
    <button class="btn btn-mini" id="btn-new">새포켓몬</button>
    <button class="btn btn-mini" id="btn-reset">초기화</button>
    <button class="btn btn-mini" id="btn-prob">확률표</button>
  </div>
</div>
<div class="flash-overlay" id="flash"></div>
<div class="modal-backdrop" id="modal-prob">
  <div class="modal">
    <h2>강화 확률표</h2>
    <div class="modal-text">현재 레벨: <span style="color:#ffd93d" id="modal-current-level">0</span>강</div>
    <table class="prob-table">
      <thead><tr><th>강</th><th>성공</th><th>유지</th><th>방생</th></tr></thead>
      <tbody id="prob-table-body"></tbody>
    </table>
    <button class="modal-close" onclick="closeModal()">닫기</button>
  </div>
</div>

var IMAGE_SOURCES = [
function(id) { return “https://play.pokemonshowdown.com/sprites/gen5/” + SHOWDOWN_NAMES[id] + “.png”; },
function(id) { return “https://cdn.jsdelivr.net/gh/PokeAPI/sprites@master/sprites/pokemon/” + id + “.png”; },
function(id) { return “https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/” + id + “.png”; }
];

var state = {
gold: 100000,
attempts: 0,
current: { baseId: 1, level: 0 }
};

function getCurrentPokemonId(baseId, level) {
var data = POKEMON_DATA[baseId];
if (!data) return baseId;
if (data[3] && level >= data[3] && data[4]) return data[4];
if (data[1] && level >= data[1] && data[2]) return data[2];
return baseId;
}

function getDisplayName(baseId, level) {
var currentId = getCurrentPokemonId(baseId, level);
var prefix = PREFIX_BY_LEVEL[level] || “”;
var name = POKEMON_DATA[currentId][0];
return prefix + name;
}

function $(id) { return document.getElementById(id); }

function render() {
var level = state.current.level;
var baseId = state.current.baseId;
var currentId = getCurrentPokemonId(baseId, level);

$(“gold”).textContent = state.gold.toLocaleString();
$(“attempts”).textContent = state.attempts;
$(“level-badge”).textContent = “+” + level + “ 강”;
if (level === 20) {
$(“level-badge”).classList.add(“max”);
} else {
$(“level-badge”).classList.remove(“max”);
}

var imgEl = $(“pokemon-img”);
if (imgEl.dataset.pokemonId !== String(currentId)) {
imgEl.dataset.pokemonId = currentId;
imgEl.dataset.attempt = “0”;
imgEl.src = IMAGE_SOURCES[0](currentId);
}
imgEl.alt = getDisplayName(baseId, level);
$(“pokemon-name”).textContent = getDisplayName(baseId, level);
$(“pokemon-number”).textContent = “NO.” + String(currentId).padStart(3, “0”);

if (level >= 20) {
$(“btn-enhance”).disabled = true;
$(“btn-enhance”).textContent = “만렙 달성”;
} else {
var cost = getEnhanceCost(level);
$(“btn-enhance”).disabled = (state.gold < cost);
$(“btn-enhance”).textContent = “강화 (” + cost.toLocaleString() + “G)”;
}

if (level === 0) {
$(“btn-sell”).disabled = true;
$(“btn-sell”).textContent = “판매불가”;
} else {
$(“btn-sell”).disabled = false;
$(“btn-sell”).textContent = “판매 (” + getSellPrice(level).toLocaleString() + “G)”;
}

if (level < 20) {
var p = PROB_TABLE[level + 1];
$(“p-success”).textContent = p[0] + “%”;
$(“p-keep”).textContent = p[1] + “%”;
$(“p-destroy”).textContent = p[2] + “%”;
} else {
$(“p-success”).textContent = “-”;
$(“p-keep”).textContent = “-”;
$(“p-destroy”).textContent = “-”;
}
}

function addLog(text, className) {
var log = $(“log”);
var div = document.createElement(“div”);
div.className = className || “”;
div.textContent = text;
log.insertBefore(div, log.firstChild);
while (log.children.length > 20) log.removeChild(log.lastChild);
}

function showPopText(text, color) {
var wrapper = document.querySelector(”.pokemon-image-wrapper”);
var pop = document.createElement(“div”);
pop.className = “pop-text”;
pop.textContent = text;
pop.style.color = color;
wrapper.appendChild(pop);
setTimeout(function() { pop.remove(); }, 1200);
}

function flashScreen() {
var f = $(“flash”);
f.classList.add(“active”);
setTimeout(function() { f.classList.remove(“active”); }, 300);
}

function vibrate(ms) {
if (navigator.vibrate) navigator.vibrate(ms);
}

function attemptEnhance() {
var level = state.current.level;
var baseId = state.current.baseId;
if (level >= 20) { addLog(“이미 만렙!”, “system”); return; }
var cost = getEnhanceCost(level);
if (state.gold < cost) { addLog(“골드 부족!”, “destroy”); return; }

state.gold -= cost;
state.attempts += 1;

var p = PROB_TABLE[level + 1];
var roll = Math.random() * 100;
var img = $(“pokemon-img”);

if (roll < p[0]) {
// 성공
var beforeId = getCurrentPokemonId(baseId, level);
state.current.level = level + 1;
var afterId = getCurrentPokemonId(baseId, level + 1);
if (afterId !== beforeId) {
flashScreen();
vibrate([30, 60, 100]);
img.classList.add(“evolving”);
setTimeout(function() { img.classList.remove(“evolving”); }, 1000);
showPopText(“진화!”, “#26e0e0”);
addLog(“진화! “ + POKEMON_DATA[beforeId][0] + “ -> “ + POKEMON_DATA[afterId][0], “evolve”);
} else {
vibrate(20);
img.classList.add(“bouncing”);
setTimeout(function() { img.classList.remove(“bouncing”); }, 600);
showPopText(“성공!”, “#2ed573”);
}
addLog(”+” + level + “ -> +” + (level + 1) + “ 성공”, “success”);
} else if (roll < p[0] + p[1]) {
// 유지
vibrate(15);
img.classList.add(“shaking”);
setTimeout(function() { img.classList.remove(“shaking”); }, 500);
showPopText(“유지…”, “#ffd93d”);
addLog(“유지 (+” + level + “)”, “keep”);
} else {
// 방생
vibrate([100, 50, 100]);
img.classList.add(“shaking”);
setTimeout(function() { img.classList.remove(“shaking”); }, 500);
showPopText(“방생…”, “#ff4757”);
addLog(getDisplayName(baseId, level) + “이(가) 방생됨…”, “destroy”);
setTimeout(function() { giveNewPokemon(true); }, 400);
}
render();
}

function sellCurrent() {
var level = state.current.level;
var baseId = state.current.baseId;
if (level === 0) { addLog(“0강은 판매 불가!”, “destroy”); return; }
var price = getSellPrice(level);
state.gold += price;
addLog(getDisplayName(baseId, level) + “ 판매 +” + price.toLocaleString() + “G”, “system”);
giveNewPokemon(false);
render();
}

function giveNewPokemon(isRelease) {
var randomId = STARTER_IDS[Math.floor(Math.random() * STARTER_IDS.length)];
state.current = { baseId: randomId, level: 0 };
var verb = isRelease ? “획득!” : “만남.”;
addLog(POKEMON_DATA[randomId][0] + “을(를) “ + verb, “system”);
render();
}

function resetGame() {
if (confirm(“모든 진행 초기화?”)) {
var startId = STARTER_IDS[Math.floor(Math.random() * STARTER_IDS.length)];
state = { gold: 100000, attempts: 0, current: { baseId: startId, level: 0 } };
$(“log”).innerHTML = ‘<div class="system">새로운 모험 시작!</div>’;
render();
}
}

function openProbModal() {
var body = $(“prob-table-body”);
var currentLevel = state.current.level;
$(“modal-current-level”).textContent = currentLevel;
body.innerHTML = “”;
for (var i = 1; i <= 20; i++) {
var pp = PROB_TABLE[i];
var cur = (i === currentLevel + 1);
var tr = document.createElement(“tr”);
var cls = cur ? “current” : “”;
tr.innerHTML =
‘<td class="' + cls + '">+’ + i + ‘</td>’ +
‘<td class="' + cls + '" style="color:#2ed573">’ + pp[0] + ‘%</td>’ +
‘<td class="' + cls + '" style="color:#ffd93d">’ + pp[1] + ‘%</td>’ +
‘<td class="' + cls + '" style="color:#ff4757">’ + pp[2] + ‘%</td>’;
body.appendChild(tr);
}
$(“modal-prob”).classList.add(“active”);
}

function closeModal() {
$(“modal-prob”).classList.remove(“active”);
}
window.closeModal = closeModal;

function init() {
var startId = STARTER_IDS[Math.floor(Math.random() * STARTER_IDS.length)];
state.current = { baseId: startId, level: 0 };
render();

$(“btn-enhance”).addEventListener(“click”, attemptEnhance);
$(“btn-sell”).addEventListener(“click”, sellCurrent);
$(“btn-new”).addEventListener(“click”, function() {
if (confirm(“새 포켓몬을 받으시겠습니까?”)) giveNewPokemon(false);
});
$(“btn-reset”).addEventListener(“click”, resetGame);
$(“btn-prob”).addEventListener(“click”, openProbModal);

var imgEl = $(“pokemon-img”);
imgEl.addEventListener(“error”, function() {
var pid = parseInt(this.dataset.pokemonId, 10);
var nextIdx = parseInt(this.dataset.attempt || “0”, 10) + 1;
if (pid && nextIdx < IMAGE_SOURCES.length) {
this.dataset.attempt = nextIdx;
this.src = IMAGE_SOURCES[nextIdx](pid);
} else {
this.src = “data:image/svg+xml;charset=utf-8,” + encodeURIComponent(
‘<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">’ +
‘<rect width="160" height="160" fill="#1f2754" rx="16"/>’ +
‘<text x="50%" y="50%" text-anchor="middle" dy=".3em" fill="#a4b0be" font-size="12">이미지 로드 실패</text>’ +
‘</svg>’
);
}
});

var modal = $(“modal-prob”);
modal.addEventListener(“click”, function(e) {
if (e.target === modal) modal.classList.remove(“active”);
});
}

init();
</script>
