<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0e27">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>PokeForge</title>
<style>
  :root {
    --bg-deep: #0a0e27;
    --bg-card: #151b3d;
    --bg-card-light: #1f2754;
    --gold: #ffd93d;
    --gold-dim: #c9a82f;
    --red: #ff4757;
    --green: #2ed573;
    --cyan: #26e0e0;
    --text: #f1f2f6;
    --text-dim: #a4b0be;
    --border: #2c3378;
    --shadow: 0 3px 0 #05081a, 0 6px 16px rgba(0,0,0,0.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { touch-action: manipulation; -webkit-text-size-adjust: 100%; }
  html, body {
    background: var(--bg-deep);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    height: 100%;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    overscroll-behavior: none;
  }
  body {
    background: radial-gradient(ellipse at top, rgba(85,82,237,0.15), transparent 60%), radial-gradient(ellipse at bottom, rgba(165,94,234,0.1), transparent 60%), var(--bg-deep);
    position: fixed;
    width: 100%;
  }
  .app {
    max-width: 500px;
    margin: 0 auto;
    padding: 8px 12px;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .header { text-align: center; padding: 8px 0; }
  .header h1 {
    font-size: clamp(16px, 5vw, 22px);
    color: var(--gold);
    text-shadow: 2px 2px 0 var(--red), 4px 4px 0 rgba(0,0,0,0.5);
    letter-spacing: 2px;
    font-weight: 900;
  }
  .statbar { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
  .stat {
    background: var(--bg-card);
    border: 2px solid var(--border);
    padding: 6px 10px;
    border-radius: 8px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-icon { font-size: 18px; }
  .stat-info { flex: 1; min-width: 0; }
  .stat-label { font-size: 10px; color: var(--text-dim); }
  .stat-value {
    font-size: 15px;
    color: var(--gold);
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pokemon-stage {
    background: linear-gradient(180deg, var(--bg-card-light) 0%, var(--bg-card) 100%);
    border: 3px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    text-align: center;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .level-badge {
    display: inline-block;
    background: var(--gold);
    color: var(--bg-deep);
    padding: 4px 12px;
    border-radius: 16px;
    font-size: 11px;
    margin-bottom: 8px;
    font-weight: 900;
    box-shadow: 0 2px 0 var(--gold-dim);
  }
  .level-badge.max {
    background: linear-gradient(90deg, #ff4757, #ffd93d, #26e0e0, #a55eea);
    background-size: 200% 100%;
    animation: rainbow 2s linear infinite;
    color: #fff;
  }
  @keyframes rainbow { 0% { background-position: 0% 0; } 100% { background-position: 200% 0; } }
  .pokemon-image-wrapper {
    position: relative;
    height: min(36vw, 160px);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 4px;
  }
  .pokemon-image {
    width: 100%;
    height: 100%;
    max-width: 160px;
    max-height: 160px;
    object-fit: contain;
    filter: drop-shadow(0 8px 16px rgba(0,0,0,0.5));
  }
  .pokemon-image.bouncing { animation: bounce 0.6s ease; }
  .pokemon-image.shaking { animation: shake 0.5s ease; }
  .pokemon-image.evolving { animation: evolve 1s ease; }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    30% { transform: translateY(-18px) scale(1.1); }
    60% { transform: translateY(0) scale(0.95); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px) rotate(-3deg); }
    40% { transform: translateX(8px) rotate(3deg); }
    60% { transform: translateX(-6px) rotate(-2deg); }
    80% { transform: translateX(6px) rotate(2deg); }
  }
  @keyframes evolve {
    0% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.25); filter: brightness(5) drop-shadow(0 0 50px #ffd93d); }
    100% { transform: scale(1); filter: brightness(1); }
  }
  .pokemon-name {
    font-size: clamp(17px, 5vw, 22px);
    color: var(--text);
    margin-bottom: 2px;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
    line-height: 1.2;
    font-weight: bold;
  }
  .pokemon-number {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: bold;
  }
  .probability-preview {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 5px;
    margin-bottom: 8px;
    padding: 6px;
    background: var(--bg-card);
    border: 2px solid var(--border);
    border-radius: 10px;
  }
  .prob { text-align: center; padding: 4px 2px; border-radius: 6px; background: rgba(255,255,255,0.03); }
  .prob-label { font-size: 10px; margin-bottom: 2px; font-weight: bold; }
  .prob-label.success { color: var(--green); }
  .prob-label.keep { color: var(--gold); }
  .prob-label.destroy { color: var(--red); }
  .prob-value { font-size: 13px; color: var(--text); font-weight: 900; }
  .result-log {
    background: rgba(0,0,0,0.3);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    margin-bottom: 8px;
    height: 62px;
    overflow-y: auto;
    font-size: 12px;
    line-height: 1.5;
    -webkit-overflow-scrolling: touch;
  }
  .result-log div { margin-bottom: 2px; animation: slideIn 0.3s ease; }
  .result-log .success { color: var(--green); }
  .result-log .keep { color: var(--gold); }
  .result-log .destroy { color: var(--red); font-weight: bold; }
  .result-log .evolve { color: var(--cyan); font-weight: bold; }
  .result-log .system { color: var(--text-dim); }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .actions { display: grid; grid-template-columns: 2fr 1fr; gap: 8px; margin-bottom: 6px; }
  button.btn {
    font-size: 15px;
    padding: 14px 10px;
    border: 3px solid;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 4px 0;
    min-height: 48px;
    -webkit-appearance: none;
    font-family: inherit;
    font-weight: bold;
  }
  button.btn:active:not(:disabled) { transform: translateY(3px); box-shadow: 0 1px 0 !important; }
  button.btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-enhance {
    background: linear-gradient(180deg, #ff6b7a 0%, var(--red) 100%);
    color: #fff;
    border-color: #c73545;
    box-shadow: 0 4px 0 #8b1f2a;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
  }
  .btn-sell {
    background: linear-gradient(180deg, #5eead4 0%, var(--cyan) 100%);
    color: var(--bg-deep);
    border-color: #0891b2;
    box-shadow: 0 4px 0 #0e7490;
    font-size: 13px;
  }
  .bottom-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .btn-mini {
    background: var(--bg-card);
    color: var(--text);
    border-color: var(--border);
    box-shadow: 0 3px 0 #000814;
    font-size: 12px;
    padding: 10px 4px;
    min-height: 42px;
  }
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-backdrop.active { display: flex; }
  .modal {
    background: var(--bg-card);
    border: 3px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    max-width: 360px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal h2 { font-size: 14px; color: var(--gold); margin-bottom: 12px; text-align: center; font-weight: 900; }
  .modal-text { font-size: 12px; line-height: 1.6; color: var(--text-dim); margin-bottom: 12px; }
  .prob-table { width: 100%; font-size: 11px; border-collapse: collapse; margin-bottom: 12px; }
  .prob-table th, .prob-table td { padding: 4px 2px; text-align: center; border-bottom: 1px solid var(--border); }
  .prob-table th { color: var(--gold); font-size: 10px; }
  .prob-table td.current { background: rgba(255,217,61,0.15); color: var(--gold); font-weight: bold; }
  button.modal-close {
    width: 100%;
    background: var(--red);
    color: #fff;
    border: 3px solid #8b1f2a;
    padding: 12px;
    border-radius: 8px;
    font-size: 15px;
    box-shadow: 0 3px 0 #8b1f2a;
    font-family: inherit;
    font-weight: bold;
  }
  .pop-text {
    position: absolute;
    font-size: 14px;
    font-weight: 900;
    pointer-events: none;
    animation: popUp 1.2s ease forwards;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.7);
    z-index: 10;
    left: 50%;
    top: 30%;
  }
  @keyframes popUp {
    0% { opacity: 0; transform: translate(-50%, 0) scale(0.5); }
    30% { opacity: 1; transform: translate(-50%, -35px) scale(1.2); }
    100% { opacity: 0; transform: translate(-50%, -90px) scale(1); }
  }
  @media (max-height: 700px) {
    .pokemon-image-wrapper { height: min(30vw, 130px); }
    .pokemon-image { max-width: 130px; max-height: 130px; }
    .result-log { height: 50px; }
  }
  @media (max-height: 600px) {
    .result-log { display: none; }
    .pokemon-image-wrapper { height: 100px; }
  }
</style>
</head>

<div class="app">
  <div class="header"><h1>POKE FORGE</h1></div>
  <div class="statbar">

      <span class="stat-icon">G</span>

  84:[10,85,null,null], 86:[10,87,null,null], 88:[10,89,null,null],
  90:[10,91,null,null],
  92:[7,93,14,94],
  96:[10,97,null,null], 98:[10,99,null,null], 100:[10,101,null,null],
  102:[10,103,null,null], 104:[10,105,null,null], 109:[10,110,null,null],
  111:[10,112,null,null], 116:[10,117,null,null], 118:[10,119,null,null],
  120:[10,121,null,null],
  129:[15,130,null,null],
  133:[10,134,null,null], 138:[10,139,null,null], 140:[10,141,null,null],
  147:[7,148,14,149]
};

// \uc9c4\ud654\ud615 ID \uc9d1\ud569 (\ub2e4\ub978 \ud3ec\ucf13\ubaac\uc758 \uc9c4\ud654 \uacb0\uacfc\uc778 ID\ub4e4)
var EVOLUTION_IDS = {};
for (var k in EVO) {
  var e = EVO[k];
  if (e[1]) EVOLUTION_IDS[e[1]] = true;
  if (e[3]) EVOLUTION_IDS[e[3]] = true;
}

// \uae30\ubcf8\ud615 = \uc9c4\ud654\ud615\uc774 \uc544\ub2cc ID (1~151 \uc911)
var STARTER_IDS = [];
for (var i = 1; i <= 151; i++) {
  if (!EVOLUTION_IDS[i]) STARTER_IDS.push(i);
}

// \uc601\ubb38 \uc774\ub984 (\uc774\ubbf8\uc9c0 CDN \ub9e4\ud551\uc6a9)
var EN_NAMES = ["bulbasaur","ivysaur","venusaur","charmander","charmeleon","charizard","squirtle","wartortle","blastoise","caterpie","metapod","butterfree","weedle","kakuna","beedrill","pidgey","pidgeotto","pidgeot","rattata","raticate","spearow","fearow","ekans","arbok","pikachu","raichu","sandshrew","sandslash","nidoranf","nidorina","nidoqueen","nidoranm","nidorino","nidoking","clefairy","clefable","vulpix","ninetales","jigglypuff","wigglytuff","zubat","golbat","oddish","gloom","vileplume","paras","parasect","venonat","venomoth","diglett","dugtrio","meowth","persian","psyduck","golduck","mankey","primeape","growlithe","arcanine","poliwag","poliwhirl","poliwrath","abra","kadabra","alakazam","machop","machoke","machamp","bellsprout","weepinbell","victreebel","tentacool","tentacruel","geodude","graveler","golem","ponyta","rapidash","slowpoke","slowbro","magnemite","magneton","farfetchd","doduo","dodrio","seel","dewgong","grimer","muk","shellder","cloyster","gastly","haunter","gengar","onix","drowzee","hypno","krabby","kingler","voltorb","electrode","exeggcute","exeggutor","cubone","marowak","hitmonlee","hitmonchan","lickitung","koffing","weezing","rhyhorn","rhydon","chansey","tangela","kangaskhan","horsea","seadra","goldeen","seaking","staryu","starmie","mrmime","scyther","jynx","electabuzz","magmar","pinsir","tauros","magikarp","gyarados","lapras","ditto","eevee","vaporeon","jolteon","flareon","porygon","omanyte","omastar","kabuto","kabutops","aerodactyl","snorlax","articuno","zapdos","moltres","dratini","dragonair","dragonite","mewtwo","mew"];

// \uc774\ubbf8\uc9c0 CDN 7\uacf3 - \ubcd1\ub82c \uc2dc\ub3c4
var IMAGE_SOURCES = [
  function(id) { return "https://cdn.jsdelivr.net/gh/PokeAPI/sprites@master/sprites/pokemon/other/official-artwork/" + id + ".png"; },
  function(id) { return "https://cdn.jsdelivr.net/gh/PokeAPI/sprites@master/sprites/pokemon/" + id + ".png"; },
  function(id) { return "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/" + id + ".png"; },
  function(id) { return "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/" + id + ".png"; },
  function(id) { return "https://play.pokemonshowdown.com/sprites/gen5/" + EN_NAMES[id-1] + ".png"; },
  function(id) { return "https://play.pokemonshowdown.com/sprites/xy/" + EN_NAMES[id-1] + ".png"; },
  function(id) { return "https://img.pokemondb.net/sprites/home/normal/" + EN_NAMES[id-1] + ".png"; }
];

// \uc0c1\ud0dc
var state = {
  gold: 100000,
  attempts: 0,
  current: { baseId: 1, level: 0 }
};

function getCurrentPokemonId(baseId, level) {
  var data = EVO[baseId];
  if (!data) return baseId;
  if (data[2] && level >= data[2] && data[3]) return data[3];
  if (data[0] && level >= data[0] && data[1]) return data[1];
  return baseId;
}

function getDisplayName(baseId, level) {
  var currentId = getCurrentPokemonId(baseId, level);
  var prefix = PREFIX_BY_LEVEL[level] || "";
  return prefix + getName(currentId);
}

function $(id) { return document.getElementById(id); }

// \uc774\ubbf8\uc9c0 \ub85c\ub354 - 7\uac1c CDN \ubcd1\ub82c + \ubb34\ud55c \uc7ac\uc2dc\ub3c4
function loadPokemonImage(id, imgElement) {
  var succeeded = false;
  var retryCount = 0;

  function tryAll() {
    if (succeeded) return;
    var attempted = 0;
    for (var i = 0; i < IMAGE_SOURCES.length; i++) {
      (function(idx) {
        var t = new Image();
        var tid = setTimeout(function() {
          if (!t.complete) {
            attempted++;
            if (attempted === IMAGE_SOURCES.length && !succeeded) retryLater();
          }
        }, 12000);
        t.onload = function() {
          clearTimeout(tid);
          if (!succeeded && t.naturalWidth > 0) {
            succeeded = true;
            imgElement.src = t.src;
            imgElement.style.opacity = "1";
          }
        };
        t.onerror = function() {
          clearTimeout(tid);
          attempted++;
          if (attempted === IMAGE_SOURCES.length && !succeeded) retryLater();
        };
        try { t.src = IMAGE_SOURCES[idx](id); } catch(e) {
          attempted++;
          if (attempted === IMAGE_SOURCES.length && !succeeded) retryLater();
        }
      })(i);
    }
  }

  function retryLater() {
    retryCount++;
    var delay = retryCount < 3 ? 2000 : 8000;
    setTimeout(function() { if (!succeeded) tryAll(); }, delay);
  }

  tryAll();
}

function render() {
  var level = state.current.level;
  var baseId = state.current.baseId;
  var currentId = getCurrentPokemonId(baseId, level);

  $("gold").textContent = state.gold.toLocaleString();
  $("attempts").textContent = state.attempts;
  $("level-badge").textContent = "+" + level;
  if (level === 20) $("level-badge").classList.add("max");
  else $("level-badge").classList.remove("max");

  var imgEl = $("pokemon-img");
  if (imgEl.dataset.pokemonId !== String(currentId)) {
    imgEl.dataset.pokemonId = currentId;
    imgEl.style.opacity = "0.3";
    loadPokemonImage(currentId, imgEl);
  }
  imgEl.alt = getDisplayName(baseId, level);
  $("pokemon-name").textContent = getDisplayName(baseId, level);
  $("pokemon-number").textContent = "NO." + ("00" + currentId).slice(-3);

  if (level >= 20) {
    $("btn-enhance").disabled = true;
    $("btn-enhance").textContent = MSG.maxAchieved;
  } else {
    var cost = getEnhanceCost(level);
    $("btn-enhance").disabled = (state.gold < cost);
    $("btn-enhance").textContent = "\uac15\ud654 (" + cost.toLocaleString() + "G)";
  }

  if (level === 0) {
    $("btn-sell").disabled = true;
    $("btn-sell").textContent = MSG.sellDisabled;
  } else {
    $("btn-sell").disabled = false;
    $("btn-sell").textContent = "\ud310\ub9e4 (" + getSellPrice(level).toLocaleString() + "G)";
  }

  if (level < 20) {
    var p = PROB_TABLE[level + 1];
    $("p-success").textContent = p[0] + "%";
    $("p-keep").textContent = p[1] + "%";
    $("p-destroy").textContent = p[2] + "%";
  } else {
    $("p-success").textContent = "-";
    $("p-keep").textContent = "-";
    $("p-destroy").textContent = "-";
  }
}

function addLog(text, cls) {
  var log = $("log");
  var div = document.createElement("div");
  if (cls) div.className = cls;
  div.textContent = text;
  log.insertBefore(div, log.firstChild);
  while (log.children.length > 20) log.removeChild(log.lastChild);
}

function showPopText(text, color) {
  var wrapper = document.querySelector(".pokemon-image-wrapper");
  var pop = document.createElement("div");
  pop.className = "pop-text";
  pop.textContent = text;
  pop.style.color = color;
  wrapper.appendChild(pop);
  setTimeout(function() { pop.remove(); }, 1200);
}

function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

function attemptEnhance() {
  var level = state.current.level;
  var baseId = state.current.baseId;
  if (level >= 20) { addLog(MSG.maxLevel, "system"); return; }
  var cost = getEnhanceCost(level);
  if (state.gold < cost) { addLog(MSG.noGold, "destroy"); return; }

  state.gold -= cost;
  state.attempts += 1;
  var p = PROB_TABLE[level + 1];
  var roll = Math.random() * 100;
  var img = $("pokemon-img");

  if (roll < p[0]) {
    var beforeId = getCurrentPokemonId(baseId, level);
    state.current.level = level + 1;
    var afterId = getCurrentPokemonId(baseId, level + 1);
    if (afterId !== beforeId) {
      vibrate([30, 60, 100]);
      img.classList.add("evolving");
      setTimeout(function() { img.classList.remove("evolving"); }, 1000);
      showPopText(MSG.evolved, "#26e0e0");
      addLog(getName(beforeId) + " -> " + getName(afterId) + " " + MSG.evolved, "evolve");
    } else {
      vibrate(20);
      img.classList.add("bouncing");
      setTimeout(function() { img.classList.remove("bouncing"); }, 600);
      showPopText(MSG.success, "#2ed573");
    }
    addLog("+" + level + " -> +" + (level + 1), "success");
  } else if (roll < p[0] + p[1]) {
    vibrate(15);
    img.classList.add("shaking");
    setTimeout(function() { img.classList.remove("shaking"); }, 500);
    showPopText(MSG.keep, "#ffd93d");
    addLog(MSG.keep + " (+" + level + ")", "keep");
  } else {
    vibrate([100, 50, 100]);
    img.classList.add("shaking");
    setTimeout(function() { img.classList.remove("shaking"); }, 500);
    showPopText(MSG.release, "#ff4757");
    addLog(getDisplayName(baseId, level) + MSG.released, "destroy");
    setTimeout(function() { giveNewPokemon(true); }, 400);
  }
  render();
}

function sellCurrent() {
  var level = state.current.level;
  var baseId = state.current.baseId;
  if (level === 0) { addLog(MSG.cantSell, "destroy"); return; }
  var price = getSellPrice(level);
  state.gold += price;
  addLog(getDisplayName(baseId, level) + " +" + price.toLocaleString() + "G", "system");
  giveNewPokemon(false);
  render();
}

function giveNewPokemon(isRelease) {
  var randomId = STARTER_IDS[Math.floor(Math.random() * STARTER_IDS.length)];
  state.current = { baseId: randomId, level: 0 };
  var verb = isRelease ? MSG.obtained : MSG.encounter;
  addLog(getName(randomId) + verb, "system");
  render();
}

function resetGame() {
  if (confirm(MSG.confirmReset)) {
    var startId = STARTER_IDS[Math.floor(Math.random() * STARTER_IDS.length)];
    state = { gold: 100000, attempts: 0, current: { baseId: startId, level: 0 } };
    $("log").innerHTML = "";
    addLog(MSG.newAdventure, "system");
    render();
  }
}

function openProbModal() {
  var body = $("prob-table-body");
  var currentLevel = state.current.level;
  $("modal-current-level").textContent = currentLevel;
  body.innerHTML = "";
  for (var i = 1; i <= 20; i++) {
    var pp = PROB_TABLE[i];
    var cur = (i === currentLevel + 1);
    var tr = document.createElement("tr");
    var cls = cur ? "current" : "";
    tr.innerHTML =
      '<td class="' + cls + '">+' + i + '</td>' +
      '<td class="' + cls + '" style="color:#2ed573">' + pp[0] + '%</td>' +
      '<td class="' + cls + '" style="color:#ffd93d">' + pp[1] + '%</td>' +
      '<td class="' + cls + '" style="color:#ff4757">' + pp[2] + '%</td>';
    body.appendChild(tr);
  }
  $("modal-prob").classList.add("active");
}

function closeModal() { $("modal-prob").classList.remove("active"); }

function init() {
  $("btn-new").textContent = "\uc0c8\ud3ec\ucf13\ubaac";
  $("btn-reset").textContent = "\ucd08\uae30\ud654";
  $("btn-prob").textContent = "\ud655\ub960\ud45c";

  addLog(MSG.greeting, "system");

  var startId = STARTER_IDS[Math.floor(Math.random() * STARTER_IDS.length)];
  state.current = { baseId: startId, level: 0 };
  render();

  $("btn-enhance").addEventListener("click", attemptEnhance);
  $("btn-sell").addEventListener("click", sellCurrent);
  $("btn-new").addEventListener("click", function() {
    if (confirm(MSG.confirmNew)) giveNewPokemon(false);
  });
  $("btn-reset").addEventListener("click", resetGame);
  $("btn-prob").addEventListener("click", openProbModal);
  $("btn-close").addEventListener("click", closeModal);

  var modal = $("modal-prob");
  modal.addEventListener("click", function(e) {
    if (e.target === modal) modal.classList.remove("active");
  });
}

// DOM\uc774 \uc644\uc804\ud788 \ub85c\ub4dc\ub41c \ud6c4 \uc2e4\ud589
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", init);
} else {
  init();
}
</script>
