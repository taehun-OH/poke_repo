<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0e27">
<title>포켓몬 강화소 ⚡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Press+Start+2P&family=Gaegu:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0a0e27;
    --bg-card: #151b3d;
    --bg-card-light: #1f2754;
    --gold: #ffd93d;
    --gold-dim: #c9a82f;
    --red: #ff4757;
    --green: #2ed573;
    --blue: #5352ed;
    --purple: #a55eea;
    --cyan: #26e0e0;
    --text: #f1f2f6;
    --text-dim: #a4b0be;
    --border: #2c3378;
    --shadow: 0 3px 0 #05081a, 0 6px 16px rgba(0,0,0,0.5);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }

html { font-size: 16px; touch-action: manipulation; -webkit-text-size-adjust: 100%; }

html, body {
background: var(–bg-deep);
color: var(–text);
font-family: ‘Jua’, sans-serif;
height: 100%;
overflow: hidden;
user-select: none;
-webkit-user-select: none;
overscroll-behavior: none;
}

body {
background:
radial-gradient(ellipse at top, rgba(85, 82, 237, 0.15), transparent 60%),
radial-gradient(ellipse at bottom, rgba(165, 94, 234, 0.1), transparent 60%),
var(–bg-deep);
padding-top: var(–safe-top);
padding-bottom: var(–safe-bottom);
position: fixed;
width: 100%;
}

body::before {
content: “”;
position: fixed; inset: 0;
background-image:
radial-gradient(1px 1px at 20% 30%, #fff, transparent),
radial-gradient(1px 1px at 70% 80%, #fff, transparent),
radial-gradient(1px 1px at 40% 60%, #fff, transparent),
radial-gradient(2px 2px at 90% 20%, #ffd93d, transparent),
radial-gradient(1px 1px at 10% 90%, #26e0e0, transparent);
background-size: 400px 400px;
opacity: 0.4;
pointer-events: none;
z-index: 0;
}

.app {
max-width: 500px;
margin: 0 auto;
padding: 8px 12px;
position: relative;
z-index: 1;
height: 100%;
display: flex;
flex-direction: column;
overflow-y: auto;
overflow-x: hidden;
-webkit-overflow-scrolling: touch;
}

/* === 컴팩트 헤더 === */
.header {
text-align: center;
padding: 6px 0 8px;
flex-shrink: 0;
}
.header h1 {
font-family: ‘Press Start 2P’, cursive;
font-size: clamp(11px, 3.5vw, 14px);
color: var(–gold);
text-shadow: 2px 2px 0 var(–red), 4px 4px 0 rgba(0,0,0,0.5);
letter-spacing: 1.5px;
}

/* === 스탯바 === */
.statbar {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 6px;
margin-bottom: 8px;
flex-shrink: 0;
}
.stat {
background: var(–bg-card);
border: 2px solid var(–border);
padding: 6px 10px;
border-radius: 8px;
box-shadow: var(–shadow);
display: flex;
align-items: center;
gap: 6px;
min-width: 0;
}
.stat-icon {
font-size: 16px;
flex-shrink: 0;
}
.stat-info { flex: 1; min-width: 0; }
.stat-label { font-size: 9px; color: var(–text-dim); letter-spacing: 0.5px; }
.stat-value {
font-size: clamp(12px, 3.5vw, 15px);
color: var(–gold);
font-family: ‘Press Start 2P’, cursive;
margin-top: 1px;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

/* === 포켓몬 스테이지 === */
.pokemon-stage {
background: linear-gradient(180deg, var(–bg-card-light) 0%, var(–bg-card) 100%);
border: 3px solid var(–border);
border-radius: 14px;
padding: 12px 12px 10px;
text-align: center;
box-shadow: var(–shadow);
position: relative;
overflow: hidden;
margin-bottom: 8px;
flex-shrink: 0;
}
.pokemon-stage::before {
content: “”;
position: absolute; inset: 0;
background: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(255,217,61,0.03) 20px, rgba(255,217,61,0.03) 21px);
pointer-events: none;
}
.level-badge {
display: inline-block;
background: var(–gold);
color: var(–bg-deep);
padding: 3px 10px;
border-radius: 16px;
font-family: ‘Press Start 2P’, cursive;
font-size: 10px;
margin-bottom: 6px;
box-shadow: 0 2px 0 var(–gold-dim);
}
.level-badge.max {
background: linear-gradient(90deg, #ff4757, #ffd93d, #26e0e0, #a55eea);
background-size: 200% 100%;
animation: rainbow 2s linear infinite;
color: #fff;
text-shadow: 1px 1px 0 #000;
}
@keyframes rainbow { 0% { background-position: 0% 0; } 100% { background-position: 200% 0; } }

.pokemon-image-wrapper {
position: relative;
height: min(36vw, 160px);
display: flex;
align-items: center;
justify-content: center;
margin-bottom: 4px;
}
.pokemon-image {
width: 100%;
height: 100%;
max-width: 160px;
max-height: 160px;
object-fit: contain;
image-rendering: pixelated;
image-rendering: -moz-crisp-edges;
image-rendering: crisp-edges;
filter: drop-shadow(0 8px 16px rgba(0,0,0,0.5));
}
.pokemon-image.bouncing { animation: bounce 0.6s ease; }
.pokemon-image.shaking { animation: shake 0.5s ease; }
.pokemon-image.evolving { animation: evolve 1s ease; }
@keyframes bounce {
0%, 100% { transform: translateY(0); }
30% { transform: translateY(-18px) scale(1.1); }
60% { transform: translateY(0) scale(0.95); }
}
@keyframes shake {
0%, 100% { transform: translateX(0); }
20% { transform: translateX(-8px) rotate(-3deg); }
40% { transform: translateX(8px) rotate(3deg); }
60% { transform: translateX(-6px) rotate(-2deg); }
80% { transform: translateX(6px) rotate(2deg); }
}
@keyframes evolve {
0% { transform: scale(1); filter: brightness(1) drop-shadow(0 8px 16px rgba(0,0,0,0.5)); }
50% { transform: scale(1.25); filter: brightness(5) drop-shadow(0 0 50px #ffd93d); }
100% { transform: scale(1); filter: brightness(1) drop-shadow(0 8px 16px rgba(0,0,0,0.5)); }
}

.pokemon-name {
font-family: ‘Gaegu’, cursive;
font-size: clamp(17px, 5vw, 22px);
color: var(–text);
margin-bottom: 2px;
text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
line-height: 1.1;
padding: 0 8px;
word-break: keep-all;
}
.pokemon-number {
font-size: 10px;
color: var(–text-dim);
font-family: ‘Press Start 2P’, cursive;
}

/* === 확률 미리보기 === */
.probability-preview {
display: grid;
grid-template-columns: 1fr 1fr 1fr;
gap: 5px;
margin-bottom: 8px;
padding: 6px;
background: var(–bg-card);
border: 2px solid var(–border);
border-radius: 10px;
flex-shrink: 0;
}
.prob { text-align: center; padding: 4px 2px; border-radius: 6px; background: rgba(255,255,255,0.03); }
.prob-label { font-size: 9px; letter-spacing: 0.5px; margin-bottom: 2px; }
.prob-label.success { color: var(–green); }
.prob-label.keep { color: var(–gold); }
.prob-label.destroy { color: var(–red); }
.prob-value { font-size: 12px; font-family: ‘Press Start 2P’, cursive; color: var(–text); }

/* === 로그 === */
.result-log {
background: rgba(0,0,0,0.3);
border: 2px solid var(–border);
border-radius: 10px;
padding: 8px 12px;
margin-bottom: 8px;
height: 62px;
overflow-y: auto;
font-size: 12px;
line-height: 1.5;
flex-shrink: 0;
-webkit-overflow-scrolling: touch;
}
.result-log div { margin-bottom: 2px; animation: slideIn 0.3s ease; word-break: keep-all; }
.result-log .success { color: var(–green); }
.result-log .keep { color: var(–gold); }
.result-log .destroy { color: var(–red); font-weight: bold; }
.result-log .evolve { color: var(–cyan); font-weight: bold; }
.result-log .system { color: var(–text-dim); }
@keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

/* === 버튼 === */
.actions {
display: grid;
grid-template-columns: 2fr 1fr;
gap: 8px;
margin-bottom: 6px;
flex-shrink: 0;
}
button.btn {
font-family: ‘Jua’, sans-serif;
font-size: 15px;
padding: 14px 10px;
border: 3px solid;
border-radius: 10px;
cursor: pointer;
transition: transform 0.08s, box-shadow 0.08s;
box-shadow: 0 4px 0;
position: relative;
letter-spacing: 0.5px;
min-height: 48px;  /* 터치 타겟 최소 사이즈 */
-webkit-appearance: none;
}
button.btn:active:not(:disabled) {
transform: translateY(3px);
box-shadow: 0 1px 0 !important;
}
button.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-enhance {
background: linear-gradient(180deg, #ff6b7a 0%, var(–red) 100%);
color: #fff;
border-color: #c73545;
box-shadow: 0 4px 0 #8b1f2a, 0 6px 12px rgba(255,71,87,0.4);
text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
}
.btn-sell {
background: linear-gradient(180deg, #5eead4 0%, #26e0e0 100%);
color: var(–bg-deep);
border-color: #0891b2;
box-shadow: 0 4px 0 #0e7490;
font-size: 13px;
}
.bottom-actions {
display: grid;
grid-template-columns: 1fr 1fr 1fr;
gap: 6px;
flex-shrink: 0;
}
.btn-mini {
background: var(–bg-card);
color: var(–text);
border-color: var(–border);
box-shadow: 0 3px 0 #000814;
font-size: 12px;
padding: 10px 4px;
min-height: 42px;
}

/* === 플래시, 모달, 팝업 === */
.flash-overlay { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 999; transition: opacity 0.2s; }
.flash-overlay.active { opacity: 0.9; }

.modal-backdrop {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.75);
display: none;
align-items: center;
justify-content: center;
z-index: 100;
padding: 20px;
backdrop-filter: blur(4px);
}
.modal-backdrop.active { display: flex; }
.modal {
background: var(–bg-card);
border: 3px solid var(–border);
border-radius: 14px;
padding: 16px;
max-width: 360px;
width: 100%;
box-shadow: 0 8px 30px rgba(0,0,0,0.8);
max-height: 80vh;
overflow-y: auto;
-webkit-overflow-scrolling: touch;
}
.modal h2 {
font-family: ‘Press Start 2P’, cursive;
font-size: 13px;
color: var(–gold);
margin-bottom: 12px;
text-align: center;
}
.modal-text { font-size: 12px; line-height: 1.6; color: var(–text-dim); margin-bottom: 12px; }
.prob-table { width: 100%; font-size: 11px; border-collapse: collapse; margin-bottom: 12px; }
.prob-table th, .prob-table td { padding: 4px 2px; text-align: center; border-bottom: 1px solid var(–border); }
.prob-table th { color: var(–gold); font-family: ‘Press Start 2P’, cursive; font-size: 8px; }
.prob-table td.current { background: rgba(255,217,61,0.15); color: var(–gold); font-weight: bold; }

button.modal-close {
width: 100%;
background: var(–red);
color: #fff;
border: 3px solid #8b1f2a;
padding: 12px;
border-radius: 8px;
font-family: ‘Jua’, sans-serif;
font-size: 15px;
cursor: pointer;
box-shadow: 0 3px 0 #8b1f2a;
min-height: 46px;
-webkit-appearance: none;
}

.pokemon-stage.enhancing::after {
content: “”;
position: absolute; inset: 0;
background: radial-gradient(circle at center, rgba(255,217,61,0.5), transparent 60%);
animation: sparkle 0.5s ease;
pointer-events: none;
}
@keyframes sparkle { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

.pop-text {
position: absolute;
font-family: ‘Press Start 2P’, cursive;
font-size: 13px;
pointer-events: none;
animation: popUp 1.2s ease forwards;
text-shadow: 2px 2px 0 rgba(0,0,0,0.7);
z-index: 10;
left: 50%;
top: 30%;
}
@keyframes popUp {
0% { opacity: 0; transform: translate(-50%, 0) scale(0.5); }
30% { opacity: 1; transform: translate(-50%, -35px) scale(1.2); }
100% { opacity: 0; transform: translate(-50%, -90px) scale(1); }
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(–border); border-radius: 2px; }

/* === 키 높이 대응 (작은 폰) === */
@media (max-height: 700px) {
.header { padding: 4px 0; }
.header h1 { font-size: 11px; }
.pokemon-stage { padding: 8px 10px; }
.pokemon-image-wrapper { height: min(30vw, 130px); }
.pokemon-image { max-width: 130px; max-height: 130px; }
.pokemon-name { font-size: 17px; }
.result-log { height: 50px; font-size: 11px; padding: 6px 10px; }
button.btn { padding: 11px 10px; font-size: 14px; min-height: 44px; }
.btn-mini { padding: 8px 4px; min-height: 38px; font-size: 11px; }
}

@media (max-height: 600px) {
.result-log { display: none; }
.pokemon-image-wrapper { height: 100px; }
}
</style>

</head>
<body>
<div class="app">
  <div class="header">
    <h1>⚡ POKE FORGE ⚡</h1>
  </div>
  <div class="statbar">
    <div class="stat">
      <span class="stat-icon">💰</span>
      <div class="stat-info">
        <div class="stat-label">GOLD</div>
        <div class="stat-value" id="gold">100,000</div>
      </div>
    </div>
    <div class="stat">
      <span class="stat-icon">🎯</span>
      <div class="stat-info">
        <div class="stat-label">ATTEMPTS</div>
        <div class="stat-value" id="attempts">0</div>
      </div>
    </div>
  </div>
  <div class="pokemon-stage" id="stage">
    <div class="level-badge" id="level-badge">+0 강</div>

  <div class="probability-preview">
    <div class="prob">
      <div class="prob-label success">✓ 성공</div>
      <div class="prob-value" id="p-success">100%</div>
    </div>
    <div class="prob">
      <div class="prob-label keep">○ 유지</div>
      <div class="prob-value" id="p-keep">0%</div>
    </div>
    <div class="prob">
      <div class="prob-label destroy">✕ 방생</div>
      <div class="prob-value" id="p-destroy">0%</div>
    </div>
  </div>
  <div class="result-log" id="log">
    <div class="system">🏕️ 오박사: 어서오게, 트레이너!</div>
  </div>
  <div class="actions">
    <button class="btn btn-enhance" id="btn-enhance">⚡ 강화 (10G)</button>
    <button class="btn btn-sell" id="btn-sell">💰 판매</button>
  </div>
  <div class="bottom-actions">
    <button class="btn btn-mini" id="btn-new">🎲 새포켓몬</button>
    <button class="btn btn-mini" id="btn-reset">🔄 초기화</button>
    <button class="btn btn-mini" id="btn-prob">📊 확률표</button>
  </div>
</div>
<div class="flash-overlay" id="flash"></div>
<div class="modal-backdrop" id="modal-prob">
  <div class="modal">
    <h2>강화 확률표</h2>
    <div class="modal-text">현재 레벨: <span style="color:#ffd93d" id="modal-current-level">0</span>강</div>
    <table class="prob-table">
      <thead><tr><th>강</th><th>성공</th><th>유지</th><th>방생</th></tr></thead>
      <tbody id="prob-table-body"></tbody>
    </table>
    <button class="modal-close" onclick="closeModal('modal-prob')">닫기</button>
  </div>
</div>
<script>

];

let state = {
gold: 100000,
attempts: 0,
current: { baseId: 1, level: 0 },
};

function getCurrentPokemonId(baseId, level){
const data = POKEMON_DATA[baseId];
if(!data) return baseId;
const [_, evo1Lv, evo1Id, evo2Lv, evo2Id] = data;
if(evo2Lv && level >= evo2Lv && evo2Id) return evo2Id;
if(evo1Lv && level >= evo1Lv && evo1Id) return evo1Id;
return baseId;
}
function getDisplayName(baseId, level){
const currentId = getCurrentPokemonId(baseId, level);
const prefix = PREFIX_BY_LEVEL[level] || ‘’;
const name = POKEMON_DATA[currentId][0];
return prefix + name;
}
const $ = id => document.getElementById(id);

function render(){
const { gold, current, attempts } = state;
const { baseId, level } = current;
const currentId = getCurrentPokemonId(baseId, level);

$(‘gold’).textContent = gold.toLocaleString();
$(‘attempts’).textContent = attempts;
$(‘level-badge’).textContent = `+${level} 강`;
$(‘level-badge’).classList.toggle(‘max’, level === 20);

const imgEl = $(‘pokemon-img’);
if (imgEl.dataset.pokemonId !== String(currentId)) {
imgEl.dataset.pokemonId = currentId;
imgEl.dataset.attempt = ‘0’;
imgEl.src = IMAGE_SOURCES[0](currentId);
}
imgEl.alt = getDisplayName(baseId, level);
$(‘pokemon-name’).textContent = getDisplayName(baseId, level);
$(‘pokemon-number’).textContent = `NO.${String(currentId).padStart(3, '0')}`;

if (level >= 20) {
$(‘btn-enhance’).disabled = true;
$(‘btn-enhance’).innerHTML = ‘🏆 만렙!’;
} else {
const cost = getEnhanceCost(level);
$(‘btn-enhance’).disabled = (gold < cost);
$(‘btn-enhance’).innerHTML = `⚡ 강화 (${cost.toLocaleString()}G)`;
}

// 0강은 판매 불가
if (level === 0) {
$(‘btn-sell’).disabled = true;
$(‘btn-sell’).textContent = ‘💰 판매불가’;
} else {
$(‘btn-sell’).disabled = false;
$(‘btn-sell’).textContent = `💰 판매 (${getSellPrice(level).toLocaleString()}G)`;
}

if (level < 20) {
const [s, k, d] = PROB_TABLE[level + 1];
$(‘p-success’).textContent = `${s}%`;
$(‘p-keep’).textContent = `${k}%`;
$(‘p-destroy’).textContent = `${d}%`;
} else {
$(‘p-success’).textContent = ‘-’;
$(‘p-keep’).textContent = ‘-’;
$(‘p-destroy’).textContent = ‘-’;
}
}

function addLog(text, className=’’){
const log = $(‘log’);
const div = document.createElement(‘div’);
div.className = className;
div.textContent = text;
log.insertBefore(div, log.firstChild);
while (log.children.length > 20) log.removeChild(log.lastChild);
}

function showPopText(text, color){
const wrapper = document.querySelector(’.pokemon-image-wrapper’);
const pop = document.createElement(‘div’);
pop.className = ‘pop-text’;
pop.textContent = text;
pop.style.color = color;
wrapper.appendChild(pop);
setTimeout(() => pop.remove(), 1200);
}
function flashScreen(){
const f = $(‘flash’);
f.classList.add(‘active’);
setTimeout(() => f.classList.remove(‘active’), 300);
}

function vibrate(ms) {
if (navigator.vibrate) navigator.vibrate(ms);
}

function attemptEnhance(){
const { current, gold } = state;
const { baseId, level } = current;
if (level >= 20) { addLog(‘🏆 이미 만렙!’, ‘system’); return; }
const cost = getEnhanceCost(level);
if (gold < cost) { addLog(‘💸 골드 부족!’, ‘destroy’); return; }

state.gold -= cost;
state.attempts += 1;
const [pSuccess, pKeep, pDestroy] = PROB_TABLE[level + 1];
const roll = Math.random() * 100;
const img = $(‘pokemon-img’);
const stage = $(‘stage’);
stage.classList.add(‘enhancing’);
setTimeout(() => stage.classList.remove(‘enhancing’), 500);

if (roll < pSuccess) {
const beforeId = getCurrentPokemonId(baseId, level);
state.current.level = level + 1;
const afterId = getCurrentPokemonId(baseId, level + 1);
const evolved = (afterId !== beforeId);
if (evolved) {
flashScreen();
vibrate([30,60,100]);
img.classList.add(‘evolving’);
setTimeout(() => img.classList.remove(‘evolving’), 1000);
showPopText(‘진화!!’, ‘#26e0e0’);
addLog(`✨ 진화! ${POKEMON_DATA[beforeId][0]} → ${POKEMON_DATA[afterId][0]}!`, ‘evolve’);
} else {
vibrate(20);
img.classList.add(‘bouncing’);
setTimeout(() => img.classList.remove(‘bouncing’), 600);
showPopText(‘성공!’, ‘#2ed573’);
}
addLog(`✓ +${level} → +${level + 1}`, ‘success’);
} else if (roll < pSuccess + pKeep) {
vibrate(15);
img.classList.add(‘shaking’);
setTimeout(() => img.classList.remove(‘shaking’), 500);
showPopText(‘유지…’, ‘#ffd93d’);
addLog(`○ 유지 (+${level})`, ‘keep’);
} else {
vibrate([100,50,100]);
img.classList.add(‘shaking’);
setTimeout(() => img.classList.remove(‘shaking’), 500);
showPopText(‘방생…’, ‘#ff4757’);
const pokeName = getDisplayName(baseId, level);
addLog(`💔 ${pokeName}이(가) 방생...`, ‘destroy’);
setTimeout(() => giveNewPokemon(true), 400);
}
render();
}

function sellCurrent(){
const { level, baseId } = state.current;
if (level === 0) { addLog(‘⚠️ 0강은 판매 불가!’, ‘destroy’); return; }
const price = getSellPrice(level);
const name = getDisplayName(baseId, level);
state.gold += price;
addLog(`💰 ${name} → +${price.toLocaleString()}G`, ‘system’);
giveNewPokemon(false);
render();
}

function giveNewPokemon(isRelease){
const randomId = STARTER_IDS[Math.floor(Math.random() * STARTER_IDS.length)];
state.current = { baseId: randomId, level: 0 };
const verb = isRelease ? ‘획득!’ : ‘만남.’;
addLog(`🌱 ${POKEMON_DATA[randomId][0]}을(를) ${verb}`, ‘system’);
render();
}

function resetGame(){
if (confirm(‘모든 진행 초기화?’)) {
state = { gold: 100000, attempts: 0, current: { baseId: STARTER_IDS[Math.floor(Math.random()*STARTER_IDS.length)], level: 0 } };
$(‘log’).innerHTML = ‘<div class="system">🏕️ 새로운 모험 시작!</div>’;
render();
}
}

function openProbModal(){
const body = $(‘prob-table-body’);
const currentLevel = state.current.level;
$(‘modal-current-level’).textContent = currentLevel;
body.innerHTML = ‘’;
for (let i = 1; i <= 20; i++) {
const [s, k, d] = PROB_TABLE[i];
const cur = (i === currentLevel + 1);
const tr = document.createElement(‘tr’);
tr.innerHTML = `<td class="${cur?'current':''}">+${i}</td> <td class="${cur?'current':''}" style="color:#2ed573">${s}%</td> <td class="${cur?'current':''}" style="color:#ffd93d">${k}%</td> <td class="${cur?'current':''}" style="color:#ff4757">${d}%</td>`;
body.appendChild(tr);
}
$(‘modal-prob’).classList.add(‘active’);
}
function closeModal(id){ $(id).classList.remove(‘active’); }
window.closeModal = closeModal;

// === 초기화 & 이벤트 바인딩 ===
function init(){
// 랜덤 시작 포켓몬 (기본형 중에서)
const startId = STARTER_IDS[Math.floor(Math.random() * STARTER_IDS.length)];
state.current = { baseId: startId, level: 0 };

render();

// 터치에 즉각 반응하도록 touchstart 우선 바인딩
const bindBtn = (id, fn) => {
const el = $(id);
let touched = false;
el.addEventListener(‘touchstart’, (e) => {
touched = true;
e.preventDefault();
fn();
}, { passive: false });
el.addEventListener(‘click’, (e) => {
if (!touched) fn();
touched = false;
});
};

bindBtn(‘btn-enhance’, attemptEnhance);
bindBtn(‘btn-sell’, sellCurrent);
bindBtn(‘btn-new’, () => {
if (confirm(‘새 포켓몬을 받으시겠습니까?’)) giveNewPokemon(false);
});
bindBtn(‘btn-reset’, resetGame);
bindBtn(‘btn-prob’, openProbModal);

// 이미지 fallback
const imgEl = $(‘pokemon-img’);
imgEl.addEventListener(‘error’, function(){
const pid = parseInt(this.dataset.pokemonId, 10);
const nextIdx = parseInt(this.dataset.attempt || ‘0’, 10) + 1;
if (pid && nextIdx < IMAGE_SOURCES.length) {
this.dataset.attempt = nextIdx;
this.src = IMAGE_SOURCES[nextIdx](pid);
} else {
this.src = “data:image/svg+xml;charset=utf-8,” + encodeURIComponent(` <svg xmlns='http://www.w3.org/2000/svg' width='160' height='160' viewBox='0 0 160 160'> <rect width='160' height='160' fill='#1f2754' rx='16'/> <circle cx='80' cy='65' r='28' fill='none' stroke='#ff4757' stroke-width='3'/> <rect x='52' y='65' width='56' height='3' fill='#ff4757'/> <circle cx='80' cy='65' r='7' fill='#ff4757'/> <text x='50%' y='120' text-anchor='middle' fill='#a4b0be' font-size='12'>이미지 오프라인</text> </svg>`);
}
});

// 모달 바깥 클릭 시 닫기
document.querySelectorAll(’.modal-backdrop’).forEach(m => {
m.addEventListener(‘click’, (e) => { if (e.target === m) m.classList.remove(‘active’); });
});

// 더블탭 줌 방지
let lastTap = 0;
document.addEventListener(‘touchend’, (e) => {
const now = Date.now();
if (now - lastTap < 300) e.preventDefault();
lastTap = now;
}, { passive: false });

// iOS 바운스 스크롤 방지 (앱 영역 외)
document.body.addEventListener(‘touchmove’, (e) => {
if (e.target.closest(’.result-log, .modal’)) return;
e.preventDefault();
}, { passive: false });
}
init();
